services:
  mysql:
    image: mysql:8.4
    container_name: backup-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-backup_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-backupcontent}
      MYSQL_USER: ${MYSQL_USER:-backup}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-backup}
    ports:
      - "3306:3306"
    volumes:
      - backup-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: backup-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      # Connexion manuelle avec les identifiants du fichier .env (pas d'auto-login)
      PMA_ARBITRARY: 1
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy

  python-extractor:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: backup-python
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USE_OPENAI: ${USE_OPENAI:-false}
      DOCUMENT_AI_USE_AI: ${DOCUMENT_AI_USE_AI:-false}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: backup-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Backup.Web.Api.Server/Dockerfile
    container_name: backup-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      python-extractor:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-backupcontent}
      MYSQL_USER: ${MYSQL_USER:-backup}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-backup}
      PythonExtractor__Url: http://python-extractor:8000
      PythonExtractor__Enabled: "true"
      Ollama__Host: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      Ollama__Enabled: "false"
      Database__ApplyMigrationsOnStartup: "true"
      UseHttpsRedirection: "false"
      ErpSync__ExcelProductPath: ${EXCEL_PRODUCT_CONTAINER_PATH:-/data/eurobrico-product}
      StoreChat__ReturnBaseUrl: ${STORE_CHAT_RETURN_BASE_URL:-http://localhost:4200}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__PublishableKey: ${STRIPE_PUBLISHABLE_KEY:-}
    volumes:
      - backup-storage:/app/Storage
      - ${EXCEL_PRODUCT_HOST_PATH:-./data/eurobrico-product}:${EXCEL_PRODUCT_CONTAINER_PATH:-/data/eurobrico-product}:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  backup-mysql-data:
  backup-storage:

