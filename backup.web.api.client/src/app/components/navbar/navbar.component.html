<div class="app-shell">
  <!-- Sidebar (desktop) -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-title">DocManager Pro</span>
      <span class="brand-sub">Industrial Logistics</span>
    </div>
    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
         class="sidebar-link">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-primary sidebar-cta" routerLink="/upload">
        <mat-icon>add</mat-icon>
        Nouvelle analyse
      </button>
    </div>
  </aside>

  <div class="main-area">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" (click)="mobileNavOpen = !mobileNavOpen" type="button">
          <mat-icon>menu</mat-icon>
        </button>
        <span class="topbar-title">{{ pageTitle }}</span>
        <nav class="topbar-tabs">
          <a *ngFor="let item of mainNavItems"
             [routerLink]="item.path"
             routerLinkActive="tab-active"
             [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
             class="topbar-tab">
            {{ item.tabLabel }}
          </a>
        </nav>
      </div>
      <div class="topbar-right">
        <span class="env-badge label-caps" *ngIf="enablePythonTest">Python / Ollama</span>
        <mat-icon class="account-icon">account_circle</mat-icon>
      </div>
    </header>

    <!-- Mobile nav overlay -->
    <nav class="mobile-nav" [class.open]="mobileNavOpen">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         (click)="mobileNavOpen = false"
         class="mobile-nav-link">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    </nav>

  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
  </div>
</div>
